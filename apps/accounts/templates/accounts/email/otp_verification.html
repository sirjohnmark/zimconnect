<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Sanganai verification code</title>
  <style>
    body { margin: 0; padding: 0; background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #111; }
    .wrapper { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .header { background: #0071e3; padding: 32px 40px; text-align: center; }
    .header h1 { margin: 0; color: #fff; font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
    .body { padding: 36px 40px; }
    .body p { margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #374151; }
    .otp-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; text-align: center; padding: 24px 16px; margin: 24px 0; }
    .otp-code { font-size: 36px; font-weight: 700; letter-spacing: 10px; color: #0071e3; font-variant-numeric: tabular-nums; }
    .expiry { font-size: 13px; color: #6b7280; margin-top: 8px; }
    .footer { padding: 20px 40px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Sanganai</h1>
    </div>
    <div class="body">
      <p>Hi <strong>{{ username }}</strong>,</p>
      <p>Here is your verification code:</p>
      <div class="otp-box">
        <div class="otp-code">{{ otp }}</div>
        <div class="expiry">Expires in {{ expiry_minutes }} minutes</div>
      </div>
      <p>If you didn't request this code, you can safely ignore this email.</p>
    </div>
    <div class="footer">
      &copy; {% now "Y" %} Sanganai. All rights reserved.
    </div>
  </div>
</body>
</html>
