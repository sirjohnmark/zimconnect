<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZimConnect — Password Reset</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#1a73e8;padding:24px 32px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;">ZimConnect</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 16px;font-size:16px;color:#333333;">Hi {{ username }},</p>
              <p style="margin:0 0 16px;font-size:16px;color:#333333;">
                We received a request to reset your password. Use the token below:
              </p>
              <div style="text-align:center;margin:0 0 24px;">
                <code style="display:inline-block;background-color:#f0f4ff;border:2px solid #1a73e8;border-radius:8px;padding:12px 24px;font-size:14px;color:#1a73e8;word-break:break-all;">{{ reset_token }}</code>
              </div>
              <p style="margin:0 0 8px;font-size:14px;color:#666666;">This token expires in 1 hour.</p>
              <p style="margin:0;font-size:14px;color:#666666;">If you did not request a password reset, please ignore this email.</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f4f4f7;padding:16px 32px;text-align:center;">
              <p style="margin:0;font-size:12px;color:#999999;">&copy; ZimConnect. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
