services:
  server:
    build: .
    command: server
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

volumes:
  static_data:
  media_data:
